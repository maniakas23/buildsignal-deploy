# SignalCore Engine — Cloudflare Worker
# Deployed to: api.signalcore.buildsignal.com
# Deploy: cd packages/signalcore && npx wrangler deploy
name = "signalcore-engine-production"
main = "src/index.ts"
compatibility_date = "2026-07-16"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "signalcore-db-production"
database_id = "SIGNALCORE_DB_PRODUCTION_ID"

[[r2_buckets]]
binding = "RAW_SIGNALS"
bucket_name = "signalcore-raw-signals-production"

[[queues.producers]]
binding = "PROCESSING_QUEUE"
queue = "signalcore-processing-production"

[[queues.consumers]]
queue = "signalcore-processing-production"
max_batch_size = 20
max_batch_timeout = 60

[[triggers]]
crons = ["*/10 * * * *", "0 * * * *", "0 6 * * *"]

[vars]
ENGINE_NAME = "signalcore"
NODE_ENV = "production"

routes = [
  { pattern = "api.signalcore.buildsignal.com/*", custom_domain = true }
]

[env.preview]
name = "signalcore-engine-preview"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "signalcore-db-preview"
database_id = "SIGNALCORE_DB_PREVIEW_ID"

[[env.preview.r2_buckets]]
binding = "RAW_SIGNALS"
bucket_name = "signalcore-raw-signals-preview"

[env.preview.vars]
NODE_ENV = "preview"

[[env.preview.queues.producers]]
binding = "PROCESSING_QUEUE"
queue = "signalcore-processing-preview"

[[env.preview.queues.consumers]]
queue = "signalcore-processing-preview"
max_batch_size = 20
max_batch_timeout = 60

[[env.preview.routes]]
pattern = "api-preview.signalcore.buildsignal.com/*"
custom_domain = true
