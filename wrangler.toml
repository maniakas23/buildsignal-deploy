# Cloudflare Pages configuration for BuildSignal v1.0
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "buildsignal"
pages_build_output_dir = "dist"
compatibility_date = "2026-07-16"
compatibility_flags = ["nodejs_compat"]

# ─── Functions Build Configuration ───
# Tell esbuild to use the server tsconfig for path alias resolution
[build]
tsconfig = "./tsconfig.server.json"

# ─── Environment Variables ───
# Set these via `wrangler pages secret put <NAME>` for sensitive values

[vars]
NODE_ENV = "production"
KIMI_AUTH_URL = "https://kimi-api.moonshot.cn"
KIMI_OPEN_URL = "https://kimi-api.moonshot.cn"
